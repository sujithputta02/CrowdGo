# Gitleaks configuration for CrowdGo
# This file configures which secrets to scan for and which to ignore

[allowlist]
# Allow documentation and example files
paths = [
  ".env.local",
  ".env.example",
  "GOOGLE_AUTH_SETUP.md",
  "SECURITY_NOTICE.md",
  "SECRET_SCANNING_RESOLUTION.md",
  "gcp-key.json.example",
  "**/*.md",
]

# Ignore specific patterns that are not actual secrets
regexes = [
  # Firebase public API keys (safe to expose, used in client-side code)
  "AIzaSy[A-Za-z0-9_-]{33}",
  # Example/template values
  "your-project-id",
  "YOUR_PRIVATE_KEY_HERE",
  "your-service-account@your-project",
  "your-firebase-api-key",
  "your-google-maps-api-key",
  # Documentation references
  "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY",
  "NEXT_PUBLIC_FIREBASE_API_KEY",
  "google\\.com",
  "firebase\\.google\\.com",
  "googleapis\\.com",
]
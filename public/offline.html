<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrowdGo - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    h1 {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    p {
      font-size: 16px;
      color: #aaa;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .features {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      text-align: left;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .feature:last-child {
      margin-bottom: 0;
    }

    .feature-icon {
      font-size: 20px;
    }

    button {
      background: #8b5cf6;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #7c3aed;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>CrowdGo is working to reconnect you to the venue network.</p>

    <div class="features">
      <div class="feature">
        <span class="feature-icon">✓</span>
        <span>Your ticket is cached locally</span>
      </div>
      <div class="feature">
        <span class="feature-icon">✓</span>
        <span>Venue map is available offline</span>
      </div>
      <div class="feature">
        <span class="feature-icon">✓</span>
        <span>Seat location is saved</span>
      </div>
      <div class="feature">
        <span class="feature-icon">⏳</span>
        <span>Live updates will sync when online</span>
      </div>
    </div>

    <button onclick="location.reload()">Try Again</button>
  </div>

  <script>
    // Check for connection restoration
    window.addEventListener('online', () => {
      location.reload();
    });

    // Auto-retry every 5 seconds
    setInterval(() => {
      fetch('/api/v1/health', { method: 'HEAD' })
        .then(() => location.reload())
        .catch(() => {});
    }, 5000);
  </script>
</body>
</html>

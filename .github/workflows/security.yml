name: Security Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security checks daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run npm audit
        run: |
          npm audit --audit-level=high
        continue-on-error: false

      - name: Check for critical severity vulnerabilities
        run: |
          npm audit --audit-level=critical --json > audit-results.json
          if [ $(jq '.metadata.vulnerabilities.critical' audit-results.json) -gt 0 ]; then
            echo "Critical severity vulnerabilities found!"
            npm audit --audit-level=critical
            exit 1
          fi

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better secret detection

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  lockfile-integrity:
    name: Lockfile Integrity Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify lockfile integrity
        run: |
          npm install --legacy-peer-deps --ignore-scripts
          
      - name: Check for lockfile changes
        run: |
          git diff --exit-code package-lock.json || (echo "package-lock.json has uncommitted changes!" && exit 1)

  security-tests:
    name: Security Test Suite
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run security tests
        run: npm test -- tests/security/

      - name: Run all tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: security
          name: security-tests

  accessibility-tests:
    name: Accessibility Test Suite
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run accessibility tests
        run: npm test -- tests/accessibility/

      - name: Check for accessibility violations
        run: |
          # Run tests and capture output
          npm test -- tests/accessibility/ --json --outputFile=a11y-results.json || true
          
          # Check if there are any violations
          if grep -q '"numFailedTests":0' a11y-results.json; then
            echo "All accessibility tests passed!"
          else
            echo "Accessibility violations found!"
            cat a11y-results.json
            exit 1
          fi

      - name: Upload accessibility results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-results
          path: a11y-results.json

  code-scanning:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  security-headers:
    name: Security Headers Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check security headers configuration
        run: |
          # Check if middleware.ts exists, if not check next.config.js/mjs
          if [ -f "middleware.ts" ]; then
            echo "Found middleware.ts"
            # Check for required security headers
            grep -q "X-Content-Type-Options" middleware.ts || (echo "Missing X-Content-Type-Options header" && exit 1)
            grep -q "X-Frame-Options" middleware.ts || (echo "Missing X-Frame-Options header" && exit 1)
            grep -q "Content-Security-Policy" middleware.ts || (echo "Missing CSP header" && exit 1)
            grep -q "Strict-Transport-Security" middleware.ts || (echo "Missing HSTS header" && exit 1)
            grep -q "Permissions-Policy" middleware.ts || (echo "Missing Permissions-Policy header" && exit 1)
            echo "All required security headers found in middleware.ts!"
          elif [ -f "next.config.js" ] || [ -f "next.config.mjs" ]; then
            echo "Found next.config file - security headers should be configured in middleware or headers config"
            echo "Skipping detailed header check for now"
          else
            echo "Warning: No middleware.ts or next.config found - ensure security headers are configured in your deployment"
          fi

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-audit, secret-scanning, lockfile-integrity, security-tests, accessibility-tests, security-headers]
    if: always()
    
    steps:
      - name: Check all jobs
        run: |
          echo "Security checks completed!"
          echo "Dependency Audit: ${{ needs.dependency-audit.result }}"
          echo "Secret Scanning: ${{ needs.secret-scanning.result }}"
          echo "Lockfile Integrity: ${{ needs.lockfile-integrity.result }}"
          echo "Security Tests: ${{ needs.security-tests.result }}"
          echo "Accessibility Tests: ${{ needs.accessibility-tests.result }}"
          echo "Security Headers: ${{ needs.security-headers.result }}"
          
          if [ "${{ needs.dependency-audit.result }}" != "success" ] || \
             [ "${{ needs.secret-scanning.result }}" != "success" ] || \
             [ "${{ needs.lockfile-integrity.result }}" != "success" ] || \
             [ "${{ needs.security-tests.result }}" != "success" ] || \
             [ "${{ needs.accessibility-tests.result }}" != "success" ] || \
             [ "${{ needs.security-headers.result }}" != "success" ]; then
            echo "One or more security checks failed!"
            exit 1
          fi
